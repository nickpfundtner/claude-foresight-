name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: cipuser
          POSTGRES_PASSWORD: cippass
          POSTGRES_DB: cip_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql://cipuser:cippass@localhost:5432/cip_test
          JWT_SECRET_KEY: test-secret-key-for-ci-only
          ENCRYPTION_KEY: ${{ secrets.CI_ENCRYPTION_KEY }}
          ANTHROPIC_API_KEY: dummy
          ENVIRONMENT: test
        run: |
          cd backend
          pytest --tb=short -q

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://placeholder.railway.app
        run: |
          cd frontend
          npm run build
